<!DOCTYPE html>
<html>
<head>
    <title>Travel Explorer - Home</title>
    <link rel="stylesheet" href="style.css">
     <link rel="stylesheet" href="Homepage.css">
</head>

<body onload="updateWishCount()">

<header>
    <h1>🌍 Interactive Travel Explorer</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="explore.html">Explore</a>
        <a href="search.html">Search</a>
        <a href="wishlist.html">Wishlist (<span id="wishCount">0</span>)</a>
    </nav>
</header>

<main>
    <div class="card">
        <h2>Find your perfect destination</h2>

        <form id="moodForm">
            <div class="form-group">
                <label>Select Mood</label>
                <select id="mood">
                    <option>Adventurous</option>
                    <option>Relaxing</option>
                    <option>Cultural</option>
                    <option>Romantic</option>
                    <option>Foodie</option>
                </select>
            </div>

            <div class="form-group">
                <label>Travel Companion</label>
                <select id="companion">
                    <option>Solo</option>
                    <option>Friends</option>
                    <option>Family</option>
                    <option>Pets</option>
                </select>
            </div>

            <button type="submit" class="primary-btn">Explore Destinations</button>
            <button type="button" class="secondary-btn" onclick="surpriseMe()">🎲 Surprise Me</button>
        </form>
    </div>
</main>

<script src="js/script.js"></script>
</body>
</html>
