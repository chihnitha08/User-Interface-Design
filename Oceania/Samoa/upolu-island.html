<!DOCTYPE html>
<html>
<head>
<title>Upolu Island</title>

<style>
body{margin:0;font-family:Segoe UI;background:#f1fff7;}

header{

background:url('https://images.unsplash.com/photo-1500375592092-40eb2168fd21');
background-size:cover;
display:flex;
align-items:center;
justify-content:center;
color:white;
position:relative;
}

header::after{
content:'';
position:absolute;
width:100%;
height:100%;
background:rgba(0,50,70,0.6);
}

h1{position:relative;font-size:60px;}

nav{background:#004d40;padding:15px;text-align:center;}
nav a{color:white;margin:10px;text-decoration:none;}

.section{padding:40px;}

.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}

.card{background:white;padding:15px;border-radius:10px;}

<body>

<header>
<h1>Upolu Island</h1>
</header>

<nav>
<a href="#about">About</a>
<a href="#attractions">Attractions</a>
<a href="#tips">Tips</a>
</nav>

<section class="section">
<p>Main island of Samoa with beaches, waterfalls, villages, and lush rainforest landscapes.</p>
</section>

<section class="section">
<div class="cards">
<div class="card"><img src="https://images.unsplash.com/photo-1501785888041-af3ef285d2b2"><p>Rainforest</p></div>
<div class="card"><img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e"><p>Beaches</p></div>
<div class="card"><img src="https://images.unsplash.com/photo-1470770841072-f978cf4d019e"><p>Villages</p></div>
</div>
</section>

<section class="section">
<ul>
<li>Drive along coastal roads</li>
<li>Visit waterfalls</li>

</ul>
</section>

<footer>Upolu Island 🌴</footer>

</html>
