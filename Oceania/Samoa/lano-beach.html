<!DOCTYPE html>
<html>
<head>
<title>Lano Beach</title>
<style>
body{margin:0;font-family:Segoe UI;background:#f0fff9;}
header{
height:60vh;
background:url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e');
background-size:cover;
display:flex;
justify-content:center;
align-items:center;
color:white;
position:relative;
}
header::after{content:'';position:absolute;width:100%;height:100%;background:rgba(0,70,90,0.5);}
h1{position:relative;font-size:55px;}
nav{background:#00897b;padding:15px;text-align:center;}
nav a{color:white;margin:10px;text-decoration:none;}
.section{padding:40px;}
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}
.card{background:white;padding:15px;border-radius:10px;}
.card img{width:100%;border-radius:10px;}
footer{background:#00897b;color:white;text-align:center;padding:20px;}

</head>
<body>

<header><h1>Lano Beach</h1></header>

<nav>
<a href="#about">About</a>
<a href="#attractions">Attractions</a>
<a href="#tips">Tips</a>
</nav>

<section class="section">
<p>Quiet tropical beach perfect for relaxation and swimming.</p>
</section>

<section class="section">
<div class="cards">
<div class="card"><img src="https://images.unsplash.com/photo-1500375592092-40eb2168fd21"><p>Shoreline</p></div>
<div class="card"><img src="https://images.unsplash.com/photo-1501785888041-af3ef285d2b2"><p>Clear Water</p></div>
<div class="card"><img src="https://images.unsplash.com/photo-1470770841072-f978cf4d019e"><p>Sunset</p></div>
</div>
</section>

<section class="section">
<ul>
<li>Perfect for picnics</li>
<li>Calm swimming area</li>
<li>Bring sunscreen</li>
</ul>
</section>

<footer>Lano Beach 🏝️</footer>

</body>
</html>
