<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lalomanu Beach</title>

<style>
body{margin:0;font-family:Segoe UI;background:#f0fff8;}

header{
height:60vh;
background:url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e');
background-size:cover;
display:flex;
align-items:center;
justify-content:center;
color:white;
position:relative;
}

header::after{
content:'';
position:absolute;
width:100%;
height:100%;
background:rgba(0,60,80,0.5);
}

h1{position:relative;font-size:55px;}

nav{
background:#00796b;
padding:15px;
text-align:center;
}

nav a{color:white;margin:10px;text-decoration:none;}

.section{padding:40px;}

.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}

.card{background:white;padding:15px;border-radius:10px;}

.card img{width:100%;border-radius:10px;}

footer{background:#00796b;color:white;text-align:center;padding:20px;}
</style>
</head>

<body>

<header>
<h1>Lalomanu Beach</h1>
</header>

<nav>
<a href="#about">About</a>
<a href="#attractions">Attractions</a>
<a href="#tips">Tips</a>
</nav>

<section class="section" id="about">
<p>One of Samoa’s most beautiful beaches with crystal clear water and white sand.</p>
</section>

<section class="section" id="attractions">
<div class="cards">
<div class="card"><img src="https://images.unsplash.com/photo-1500375592092-40eb2168fd21"><p>Lagoon View</p></div>
<div class="card"><img src="https://images.unsplash.com/photo-1501785888041-af3ef285d2b2"><p>Coral Reef</p></div>
<div class="card"><img src="https://images.unsplash.com/photo-1470770841072-f978cf4d019e"><p>Beach Huts</p></div>
</div>
</section>

<section class="section">
<ul>
<li>Best sunrise spot in Samoa</li>
<li>Snorkeling recommended</li>
<li>Stay in beach fales</li>
</ul>
</section>

<footer>Lalomanu Paradise 🌊</footer>

</body>
</html>
