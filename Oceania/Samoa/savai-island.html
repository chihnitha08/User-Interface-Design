<!DOCTYPE html>
<html>
<head>
<title>Savai'i Island</title>
<style>
body{margin:0;font-family:Segoe UI;background:#f0fff6;}
header{
height:60vh;
background:url('https://images.unsplash.com/photo-1500375592092-40eb2168fd21');
background-size:cover;
display:flex;
justify-content:center;
align-items:center;
color:white;
position:relative;
}
header::after{
content:'';
position:absolute;
width:100%;height:100%;
background:rgba(0,60,80,0.6);
}
h1{position:relative;font-size:60px;}
nav{background:#00695c;padding:15px;text-align:center;}
nav a{color:white;margin:10px;text-decoration:none;}
.section{padding:40px;}
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}
.card{background:white;padding:15px;border-radius:10px;}
.card img{width:100%;border-radius:10px;}
footer{background:#00695c;color:white;text-align:center;padding:20px;}
</style>
</head>
<body>

<header><h1>Savai'i Island</h1></header>

<nav>
<a href="#about">About</a>
<a href="#attractions">Attractions</a>
<a href="#tips">Tips</a>
</nav>

<section class="section">
<p>Largest island in Samoa known for lava fields, villages, and untouched natural beauty.</p>
</section>

<section class="section">
<div class="cards">
<div class="card"><img src="https://images.unsplash.com/photo-1501785888041-af3ef285d2b2"><p>Lava Fields</p></div>
<div class="card"><img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e"><p>Coastline</p></div>
<div class="card"><img src="https://images.unsplash.com/photo-1470770841072-f978cf4d019e"><p>Villages</p></div>
</div>
</section>

<section class="section">
<ul>
<li>Rent a car for exploring</li>
<li>Visit volcanic sites</li>
<li>Stay in beach fales</li>
</ul>
</section>

<footer>Savai'i 🌋</footer>

</body>
</html>
