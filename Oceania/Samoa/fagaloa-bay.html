<!DOCTYPE html>
<html>
<head>
<title>Fagaloa Bay</title>

<style>
body{margin:0;font-family:Segoe UI;background:#f0fff6;}

header{

background-size:cover;
display:flex;
justify-content:center;
align-items:center;
color:white;
position:relative;
}

header::after{

position:absolute;
width:100%;
height:100%;
background:rgba(0,60,80,0.6);
}

h1{position:relative;font-size:55px;}

nav{background:#004d40;padding:15px;text-align:center;}

.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}

.card{background:white;padding:15px;border-radius:10px;}

<body>

<header>
<h1>Fagaloa Bay</h1>
</header>

<nav>
<a href="#about">About</a>

</nav>

<section class="section">
<p>Remote scenic bay surrounded by cliffs, rainforest, and waterfalls.</p>
</section>

<section class="section">
<div class="cards">
<div class="card"><img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e"><p>Bay View</p></div>
<div class="card"><img src="https://images.unsplash.com/photo-1501785888041-af3ef285d2b2"><p>Cliffs</p></div>
<div class="card"><img src="https://images.unsplash.com/photo-1470770841072-f978cf4d019e"><p>Forest Coast</p></div>
</div>
</section>

<section class="section">
<ul>
