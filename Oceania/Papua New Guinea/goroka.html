<!DOCTYPE html>
<html>
<head>
<title>Goroka</title>
<style>
body{margin:0;font-family:Segoe UI;background:#f2fff7;}
header{
height:60vh;
background:url('https://images.unsplash.com/photo-1482192596544-9eb780fc7f66');
background-size:cover;
display:flex;align-items:center;justify-content:center;
color:white;position:relative;text-align:center;
}
header::after{
content:'';position:absolute;width:100%;height:100%;
background:rgba(0,60,30,0.6);
}
header h1{position:relative;font-size:60px;}

nav{background:#2e6b4f;padding:15px;text-align:center;}
nav a{color:white;margin:0 10px;text-decoration:none;}

.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;padding:40px;}
.card{background:white;padding:10px;border-radius:10px;}
.card img{width:100%;height:180px;object-fit:cover;border-radius:10px;}

footer{background:#2e6b4f;color:white;text-align:center;padding:20px;}
</style>
</head>

<body>

<header><h1>Goroka 🇵🇬</h1></header>

<nav>
<a href="#about">About</a>
<a href="#attractions">Attractions</a>
<a href="#tips">Tips</a>
</nav>

<section id="about" style="padding:40px;">
<p>Goroka is a highland town known for coffee plantations and vibrant cultural festivals.</p>
</section>

<section id="attractions">
<div class="cards">

<div class="card">
<img src="https://images.unsplash.com/photo-1500375592092-40eb2168fd21">
<h3>Asaro Valley</h3>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1500534314209-a25ddb2bd429">
<h3>Cultural Village</h3>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1501785888041-af3ef285d2b2">
<h3>Highland Views</h3>
</div>

</div>
</section>

<section id="tips" style="padding:40px;">
<p>Carry warm clothes, explore local tribes, and try fresh coffee.</p>
</section>

<footer>Goroka Travel Guide</footer>

</body>
</html>
