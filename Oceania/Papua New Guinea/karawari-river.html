<!DOCTYPE html>
<html>
<head>
<title>Karawari River</title>
<style>
body{margin:0;font-family:Segoe UI;background:#f6fff8;}

</section>

<div class="card"><img src="https://images.unsplash.com/photo-1501785888041-af3ef285d2b2"><h3>Wildlife Viewing</h3></div>

<footer>Karawari River Guide</footer>
