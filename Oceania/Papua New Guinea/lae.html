<!DOCTYPE html>
<html>
<head>
<title>Lae</title>
<style>
body{margin:0;font-family:Segoe UI;background:#f4fff9;}
header{
height:60vh;
background:url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e');
background-size:cover;
display:flex;align-items:center;justify-content:center;
color:white;position:relative;
}
header::after{
content:'';position:absolute;width:100%;height:100%;
background:rgba(0,40,60,0.6);
}
header h1{position:relative;font-size:60px;}

nav{background:#0f4d3a;text-align:center;padding:15px;}
nav a{color:white;text-decoration:none;margin:10px;}

.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;padding:40px;}
.card{background:white;padding:10px;border-radius:10px;}
.card img{width:100%;height:180px;object-fit:cover;}

footer{background:#0f4d3a;color:white;text-align:center;padding:20px;}
</style>
</head>

<body>

<header><h1>Lae 🇵🇬</h1></header>

<nav>
<a href="#about">About</a>
<a href="#attractions">Attractions</a>
<a href="#tips">Tips</a>
</nav>

<section id="about" style="padding:40px;">
<p>Lae is Papua New Guinea’s second-largest city and a key coastal hub.</p>
</section>

<section id="attractions">
<div class="cards">

<div class="card">
<img src="https://images.unsplash.com/photo-1500375592092-40eb2168fd21">
<h3>Botanical Gardens</h3>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1501785888041-af3ef285d2b2">
<h3>Coastline Views</h3>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1500534314209-a25ddb2bd429">
<h3>Harbour Area</h3>
</div>

</div>
</section>

<section id="tips" style="padding:40px;">
<p>Best for transit and coastal exploration.</p>
</section>

<footer>Lae Travel Guide</footer>

</body>
</html>
