<!DOCTYPE html>
<html>
<head>
<title>Mount Wilhelm</title>
<style>
body{margin:0;font-family:Segoe UI;background:#f3fff7;}
header{
height:60vh;
background:url('https://images.unsplash.com/photo-1501785888041-af3ef285d2b2');
background-size:cover;
display:flex;align-items:center;justify-content:center;
color:white;position:relative;text-align:center;
}
header::after{
content:'';position:absolute;width:100%;height:100%;
background:rgba(0,50,30,0.6);
}
header h1{position:relative;font-size:60px;}

nav{text-align:center;background:#1b5e3b;padding:15px;}
nav a{color:white;margin:10px;text-decoration:none;}

.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;padding:40px;}
.card{background:white;padding:10px;border-radius:10px;}
.card img{width:100%;height:180px;object-fit:cover;}

footer{text-align:center;background:#1b5e3b;color:white;padding:20px;}
</style>
</head>
<body>

<header><h1>Mount Wilhelm 🇵🇬</h1></header>

<nav>
<a href="#about">About</a>
<a href="#attractions">Attractions</a>
<a href="#tips">Tips</a>
</nav>

<section id="about" style="padding:40px;">
<p>Highest mountain in Papua New Guinea, famous for trekking and alpine scenery.</p>
</section>

<section id="attractions">
<div class="cards">
<div class="card"><img src="https://images.unsplash.com/photo-1500375592092-40eb2168fd21"><h3>Summit Trail</h3></div>
<div class="card"><img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee"><h3>Alpine Lakes</h3></div>
<div class="card"><img src="https://images.unsplash.com/photo-1482192596544-9eb780fc7f66"><h3>Cloud Forest</h3></div>
</div>
</section>

<section id="tips" style="padding:40px;">
<p>Prepare for cold weather and high altitude trekking.</p>
</section>

<footer>Mount Wilhelm Guide</footer>

</body>
</html>
