<!DOCTYPE html>
<html>
<head>
    <title>Search Destinations</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="loadAllDestinations(); updateWishCount();">

<header>
    <h1>Search Destinations</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="explore.html">Explore</a>
        <a href="wishlist.html">Wishlist (<span id="wishCount">0</span>)</a>
    </nav>
</header>

<main class="center">

    <h2>Filter Destinations</h2>

    <select id="continentFilter" onchange="applySearchFilters()">
        <option value=""> Continents</option>
        <option>Asia</option>
        <option>Europe</option>
    </select>

    <select id="moodFilter" onchange="applySearchFilters()">
        <option value="">Moods</option>
        <option>Adventurous</option>
        <option>Relaxing</option>
        <option>Cultural</option>
        <option>Romantic</option>
        <option>Foodie</option>
    </select>

    <select id="companionFilter" onchange="applySearchFilters()">
        <option value="">Companions</option>
        <option>Solo</option>
        <option>Friends</option>
        <option>Family</option>
        <option>Pets</option>
        <option>Couple</option>
    </select>

    <div id="searchGrid" class="grid"></div>

</main>

<script src="js/script.js"></script>
</body>
</html>
